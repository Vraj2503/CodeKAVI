services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codekavi-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ZILLIZ_URI=${ZILLIZ_URI}
      - ZILLIZ_API_KEY=${ZILLIZ_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    depends_on:
      - redis
    volumes:
      - backend-reports:/app/output/reports
      - backend-clones:/app/cloned_repos

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codekavi-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - BACKEND_URL=http://backend:8000
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: codekavi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  backend-reports:
  backend-clones:
  redis-data:
